# FleetHub static placeholder — to be installed at:
#   /etc/nginx/sites-available/fleethub  (on 100.91.194.83)
# After symlinking into sites-enabled, run:
#   sudo certbot --nginx -d fleethub.pcc2k.com --non-interactive --agree-tos -m msaville.pcc2k@gmail.com --redirect
server {
    listen 80;
    server_name fleethub.pcc2k.com;

    root /var/www/fleethub;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
